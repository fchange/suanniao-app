name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift build
        run: swift build

      - name: Build app bundle
        run: make build

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: suanniao-app
          path: build/蒜鸟蒜鸟.app
